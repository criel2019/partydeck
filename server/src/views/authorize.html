<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PartyPlay - 로그인</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:#0a0a12;color:#e8e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh}
.card{width:100%;max-width:360px;padding:40px 28px;text-align:center}
.logo{font-size:28px;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#ff6b35,#ff2d78);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#7a7a9a;font-size:14px;margin-bottom:32px}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-kakao{background:#FEE500;color:#191919}
.btn-naver{background:#03C75A;color:#fff}
.btn-google{background:#fff;color:#333;border:1px solid rgba(0,0,0,.1)}
.foot{margin-top:24px;font-size:11px;color:#7a7a9a}
</style>
</head>
<body>
<div class="card">
  <div class="logo">PartyPlay</div>
  <div class="sub">편한 계정 하나로 시작하세요</div>
  <a class="btn btn-kakao" href="/auth/kakao?{{queryString}}">
    <svg width="18" height="18" viewBox="0 0 18 18"><path d="M9 1C4.58 1 1 3.8 1 7.19c0 2.17 1.45 4.08 3.63 5.17l-.93 3.42c-.08.3.26.54.52.37l4.1-2.71c.22.02.44.03.68.03 4.42 0 8-2.8 8-6.28S13.42 1 9 1" fill="#191919"/></svg>
    카카오로 시작
  </a>
  <a class="btn btn-naver" href="/auth/naver?{{queryString}}">
    <svg width="18" height="18" viewBox="0 0 18 18"><path d="M12.16 9.67L5.55 1H1v16h4.84V9.33L12.45 18H17V1h-4.84z" fill="#fff"/></svg>
    네이버로 시작
  </a>
  <a class="btn btn-google" href="/auth/google?{{queryString}}">
    <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2a10.34 10.34 0 00-.16-1.84H9v3.48h4.84a4.14 4.14 0 01-1.8 2.72v2.26h2.92A8.78 8.78 0 0017.64 9.2z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.34A9 9 0 009 18z" fill="#34A853"/><path d="M3.97 10.71A5.41 5.41 0 013.68 9c0-.6.1-1.17.29-1.71V4.95H.96A9 9 0 000 9c0 1.45.35 2.83.96 4.05l3.01-2.34z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 00.96 4.95l3.01 2.34C4.68 5.16 6.66 3.58 9 3.58z" fill="#EA4335"/></svg>
    Google로 시작
  </a>
  <div class="foot">로그인하면 이용약관에 동의하는 것으로 간주합니다.</div>
</div>
</body>
</html>
